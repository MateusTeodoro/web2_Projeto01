<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/../fragments/head :: head('Editar Categoria')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container">
        <h1>Editar Categoria</h1>
        <form action="#" th:action="@{/categoria/save}" th:object="${categoria}" method="POST">

            <!-- Campo necessário para que o save saiba que não estamos criando, mas editando um produto -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-group row">
                <label for="name" class="col-sm-2 col-form-label">Nome</label>
                <div class="col-sm-10">
                    <input type="text" th:field="*{name}" class="form-control" id="name" name="name"
                        placeholder="Digite o nome da categoria">
                </div>
            </div>
            
            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="description">Descrição:</label>
                <div class="col-sm-10">
                    <textarea id="description" th:field="*{description}" class="form-control" name="description"
                        rows="4" cols="50"></textarea>
                </div>
            </div>
            
            <button type="submit" class="btn btn-info col-2">Atualizar Categoria</button>
        </form>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
