<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/../fragments/head :: head('Listar Faca')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container-fluid pt-5 px-5">
        <h1>Listagem de Facas</h1>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Descrição</th>
                    <th scope="col">Tamanho da Lâmina</th>
                    <th scope="col">Ano</th>
                    <th scope="col">Categoria</th>
                    <th scope="col">Fabricante</th>
                    <th scope="col">Materiais</th>
                    <th scope="col" sec:authorize="hasAuthority('Admin')">Excluir</th>
                    <th scope="col" sec:authorize="hasAuthority('Admin')">Editar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="knife : ${knifeList}">
                    <td scope="row" th:text="${knife.name}"></td>
                    <td scope="row" th:text="${knife.description}"></td>
                    <td scope="row" th:text="${knife.size}"></td>
                    <td scope="row" th:text="${knife.year}"></td>
                    <td scope="row" th:text="${knife.categoria.name}"></td>
                    <td scope="row" th:text="${knife.fabricante.name}"></td>
                    <td scope="row">
                        <span th:each="mat : ${knife.materiais}" > <!-- Faz o loop de materiais -->
                            <span th:text="${mat.name}"></span> <!-- Imprime o nome de cada material -->
                            <span th:if="${!matStat.last}">, </span> <!-- Coloca uma vírgula depois de cada material exceto o último -->
                        </span>
                    </td>
                    <td scope="row">
                        <a th:href="@{/knife/delete/{id}(id=${knife.id})}" sec:authorize="hasAuthority('Admin')">Deletar</a>
                    </td>
                    <td scope="row">
                        <a th:href="@{/knife/edit/{id}(id=${knife.id})}" sec:authorize="hasAuthority('Admin')">Editar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="row">
        <a th:href="@{/knife/create}">
          <button sec:authorize="hasAuthority('Admin')" class="btn btn-primary">Cadastrar Faca</button>
        </a>
      </div>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
