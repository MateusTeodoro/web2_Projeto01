<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/../fragments/head :: head('Listar Faca')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container pt-5">
        <h1>Listagem de Facas</h1>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Descrição</th>
                    <th scope="col">Tamanho da Lâmina</th>
                    <th scope="col">Ano</th>
                    <th scope="col">Excluir</th>
                    <th scope="col">Editar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="knife : ${knifeList}">
                    <td scope="row" th:text="${knife.name}"></td>
                    <td scope="row" th:text="${knife.description}"></td>
                    <td scope="row" th:text="${knife.size}"></td>
                    <td scope="row" th:text="${knife.year}"></td>
                    <td>
                        <a th:href="@{/knife/delete/{id}(id=${knife.id})}">Deletar</a>
                    </td>
                    <td>
                        <a th:href="@{/knife/edit/{id}(id=${knife.id})}">Editar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="row">
        <a th:href="@{/knife/create}">
          <button class="btn btn-primary">Cadastrar Faca</button>
        </a>
      </div>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
