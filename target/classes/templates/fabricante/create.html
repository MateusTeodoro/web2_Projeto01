<th:block th:replace="~{/../fragments/head :: head('Cadastrar Fabricante')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container pt-5">
        
        <h1>Cadastrar Fabricante</h1>
        <form action="#" th:action="@{/fabricante/save}" th:object="${fabricante}" method="POST">
            
            <div class="form-group row">
                <label for="name" class="col-sm-2 col-form-label">Nome:</label>
                <div class="col-sm-10">
                    <input type="text" th:field="*{name}" class="form-control" id="name" name="name" placeholder="Digite o nome do fabricante">
                    <p th:if="${#fields.hasErrors('name')}" th:errorclass="text-danger" th:errors="*{name}" />
                </div>
            </div>
            
            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="origem">Origem:</label>
                <div class="col-sm-10">
                    <textarea id="origem" th:field="*{origem}" class="form-control" name="origem" rows="4" cols="50"></textarea>
                    <p th:if="${#fields.hasErrors('origem')}" th:errorclass="text-danger" th:errors="*{origem}" />
                </div>
            </div>

            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="anoFundacao">Ano de Fundação:</label>
                <div class="col-sm-10">
                    <input type="number" th:field="*{anoFundacao}" class="form-control" id="anoFundacao" name="anoFundacao" placeholder="Digite o ano de fundação:">
                    <p th:if="${#fields.hasErrors('anoFundacao')}" th:errorclass="text-danger" th:errors="*{anoFundacao}" />
                </div>
            </div>
            
            <button type="submit" class="btn btn-info">Cadastrar Fabricante</button>

        </form>
    </div>

    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
