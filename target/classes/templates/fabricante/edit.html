<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/../fragments/head :: head('Editar Fabricante')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container">
        <h1>Editar Fabricante</h1>
        <form action="#" th:action="@{/fabricante/save}" th:object="${fabricante}" method="POST">

            <!-- Campo necessário para que o save saiba que não estamos criando, mas editando um produto -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-group row">
                <label for="name" class="col-sm-2 col-form-label">Nome</label>
                <div class="col-sm-10">
                    <input type="text" th:field="*{name}" class="form-control" id="name" name="name" placeholder="Digite o nome da fabricante">
                </div>
            </div>
            
            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="origem">Origem:</label>
                <div class="col-sm-10">
                    <textarea id="origem" th:field="*{origem}" class="form-control" name="origem" rows="4" cols="50"></textarea>
                </div>
            </div>

            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="anoFundacao">Ano de Fundação:</label>
                <div class="col-sm-10">
                    <textarea id="anoFundacao" th:field="*{anoFundacao}" class="form-control" name="anoFundacao" rows="4" cols="50"></textarea>
                </div>
            </div>
            
            <button type="submit" class="btn btn-info col-2">Atualizar Fabricante</button>
        </form>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
