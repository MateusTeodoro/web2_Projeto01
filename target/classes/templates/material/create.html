<th:block th:replace="~{/../fragments/head :: head('Cadastrar Material')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container pt-5">
        
        <h1>Cadastrar Material</h1>
        <form action="#" th:action="@{/material/save}" th:object="${material}" method="POST">
            
            <div class="form-group row">
                <label for="name" class="col-sm-2 col-form-label">Nome:</label>
                <div class="col-sm-10">
                    <input type="text" th:field="*{name}" class="form-control" id="name" name="name" placeholder="Digite o nome do material">
                    <p th:if="${#fields.hasErrors('name')}" th:errorclass="text-danger" th:errors="*{name}" />
                </div>
            </div>
            
            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="tipoUso">Tipo de Uso:</label>
                <div class="col-sm-10">
                    <textarea id="tipoUso" th:field="*{tipoUso}" class="form-control" name="tipoUso" rows="1" cols="50" placeholder="(Cabo, Lâmina, etc.)"></textarea>
                    <p th:if="${#fields.hasErrors('tipoUso')}" th:errorclass="text-danger" th:errors="*{tipoUso}" />
                </div>
            </div>
            
            <button type="submit" class="btn btn-info">Cadastrar Material</button>

        </form>
    </div>

    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
