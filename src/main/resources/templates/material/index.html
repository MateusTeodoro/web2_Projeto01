<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/../fragments/head :: head('Listar Material')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container pt-5">
        <h1>Listagem de Materiais</h1>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Tipo de Uso</th>
                    <th scope="col" sec:authorize="hasAuthority('Admin')">Excluir</th>
                    <th scope="col" sec:authorize="hasAuthority('Admin')">Editar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="material : ${materials}">
                    <td scope="row" th:text="${material.name}"></td>
                    <td scope="row" th:text="${material.tipoUso}"></td>
                    <td>
                        <a th:href="@{/material/delete/{id}(id=${material.id})}" sec:authorize="hasAuthority('Admin')">Deletar</a>
                    </td>
                    <td>
                        <a th:href="@{/material/edit/{id}(id=${material.id})}" sec:authorize="hasAuthority('Admin')">Editar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="row">
        <a th:href="@{/material/create}">
          <button sec:authorize="hasAuthority('Admin')" class="btn btn-primary">Cadastrar Material</button>
        </a>
      </div>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
