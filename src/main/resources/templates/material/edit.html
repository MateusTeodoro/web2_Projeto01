<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/../fragments/head :: head('Editar Material')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container pt-5">
        <h1>Editar Material</h1>
        <form action="#" th:action="@{/material/save}" th:object="${material}" method="POST">

            <!-- Campo necessário para que o save saiba que não estamos criando, mas editando um produto -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-group row">
                <label for="name" class="col-sm-2 col-form-label">Nome:</label>
                <div class="col-sm-10">
                    <input type="text" th:field="*{name}" class="form-control" id="name" name="name"
                        placeholder="Digite o nome da material">
                </div>
            </div>
            
            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="tipoUso">Tipo de Uso:</label>
                <div class="col-sm-10">
                    <textarea id="tipoUso" th:field="*{tipoUso}" class="form-control" name="tipoUso" rows="1" cols="50" placeholder="(Cabo, Lâmina, etc.)"></textarea>
                </div>
            </div>
            
            <button type="submit" class="btn btn-info col-2">Atualizar Material</button>
        </form>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
