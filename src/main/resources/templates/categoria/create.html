<th:block th:replace="~{/../fragments/head :: head('Cadastrar Categoria')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container pt-5">
        
        <h1>Cadastrar Categoria</h1>
        <form action="#" th:action="@{/categoria/save}" th:object="${categoria}" method="POST">
            
            <div class="form-group row">
                <label for="name" class="col-sm-2 col-form-label">Nome:</label>
                <div class="col-sm-10">
                    <input type="text" th:field="*{name}" class="form-control" id="name" name="name" placeholder="Digite o nome da categoria">
                    <p th:if="${#fields.hasErrors('name')}" th:errorclass="text-danger" th:errors="*{name}" />
                </div>
            </div>
            
            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="description">Descrição:</label>
                <div class="col-sm-10">
                    <textarea id="description" th:field="*{description}" class="form-control" name="description" rows="4" cols="50"></textarea>
                    <p th:if="${#fields.hasErrors('description')}" th:errorclass="text-danger" th:errors="*{description}" />
                </div>
            </div>
            
            <button type="submit" class="btn btn-info">Cadastrar Categoria</button>

        </form>
    </div>

    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
