<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/../fragments/head :: head('Listar Categoria')}"></th:block>

<body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container pt-5">
        <h1>Listagem de Categorias</h1>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Descrição</th>
                    <th scope="col" sec:authorize="hasAuthority('Admin')">Excluir</th>
                    <th scope="col" sec:authorize="hasAuthority('Admin')">Editar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="categoria : ${categorias}">
                    <td scope="row" th:text="${categoria.name}"></td>
                    <td scope="row" th:text="${categoria.description}"></td>
                    <td>
                        <a th:href="@{/categoria/delete/{id}(id=${categoria.id})}" sec:authorize="hasAuthority('Admin')">Deletar</a>
                    </td>
                    <td>
                        <a th:href="@{/categoria/edit/{id}(id=${categoria.id})}" sec:authorize="hasAuthority('Admin')">Editar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="row">
        <a th:href="@{/categoria/create}">
          <button sec:authorize="hasAuthority('Admin')" class="btn btn-primary">Cadastrar Categoria</button>
        </a>
      </div>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
</body>

</html>
